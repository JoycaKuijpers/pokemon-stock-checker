name: Pokémon Stock Check

on:
  schedule:
    # Elke 15 minuten checken (GitHub Actions minimum = 5 min, maar 15 is vriendelijker)
    - cron: "*/15 * * * *"
  workflow_dispatch: # Handmatig starten via GitHub UI

permissions:
  contents: write # Nodig om state.json terug te committen

jobs:
  check-stock:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('requirements.txt') }}
          restore-keys: playwright-chromium-

      - name: Install Playwright system dependencies
        run: |
          sudo apt-get install -y \
            libasound2t64 libatk-bridge2.0-0t64 libcups2t64 \
            libdrm2 libgbm1 libgtk-3-0t64 libxcomposite1 \
            libxdamage1 libxrandr2 libxkbcommon0 libnss3 libnspr4 \
            libxshmfence1 libxext6 libxfixes3 libx11-6 libpango-1.0-0

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run stock checker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          PYTHONUNBUFFERED: "1"
        run: python check_stock.py

      - name: Commit state changes
        run: |
          git config user.name "pokemon-stock-bot"
          git config user.email "bot@github-actions"
          find . -maxdepth 2 -name "state.json" ! -path "./.git/*" -exec git add {} +
          if git diff --cached --quiet; then
            echo "Geen state wijzigingen."
          else
            git commit -m "chore: update stock state [skip ci]"
            git pull --rebase origin main
            git push
          fi
