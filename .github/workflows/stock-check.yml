name: Pokémon Stock Check

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-stock:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests==2.32.3 beautifulsoup4==4.12.3 lxml==5.2.2

      - name: Run stock checker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python check_stock.py

      - name: Commit state changes
        run: |
          git config user.name "pokemon-stock-bot"
          git config user.email "bot@github-actions"
          git add state.json
          if git diff --cached --quiet; then
            echo "Geen state wijzigingen."
          else
            git commit -m "chore: update stock state [skip ci]"
            git push
          fi
