name: Send Free Alerts

on:
  schedule:
    # Elke 30 minuten checken of er berichten klaar zijn om te sturen
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-free-alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Send free alerts
        env:
          WHOP_API_KEY: ${{ secrets.WHOP_API_KEY }}
          WHOP_CHANNEL_ID: ${{ secrets.WHOP_CHANNEL_ID }}
        run: python send_free_alerts.py

      - name: Commit state changes
        run: |
          git config user.name "pokemon-stock-bot"
          git config user.email "bot@github-actions"
          find . -maxdepth 2 \( -name "state.json" -o -name "pending_paid.json" -o -name "pending_free.json" \) ! -path "./.git/*" -exec git add {} +
          if git diff --cached --quiet; then
            echo "Geen state wijzigingen."
          else
            git commit -m "chore: update stock state [skip ci]"
            git pull --rebase
            git push
          fi
