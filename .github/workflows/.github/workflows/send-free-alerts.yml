name: Send Free Alerts

on:
  schedule:
    # Elke 30 minuten checken of er berichten klaar zijn om te sturen
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  send-free-alerts:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Send free alerts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_FREE: ${{ secrets.TELEGRAM_CHANNEL_FREE }}
        run: python send_free_alerts.py

      - name: Commit pending changes
        run: |
          git config user.name "pokemon-stock-bot"
          git config user.email "bot@github-actions"
          find . -maxdepth 2 -name "pending_free.json" ! -path "./.git/*" -exec git add {} +
          if git diff --cached --quiet; then
            echo "Geen wijzigingen in pending_free.json"
          else
            git commit -m "chore: update pending free alerts [skip ci]"
            git push
          fi
